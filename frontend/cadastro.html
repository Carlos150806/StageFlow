<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <h1>Cadastro</h1>

    <label for="tipo-usuario">Eu sou:</label>
    <select id="tipo-usuario">
      <option value="estudante">Estudante</option>
      <option value="empresa">Empresa</option>
      <option value="instituicao">Instituição de Ensino</option>
    </select>

    <!-- Cada tipo tem seus próprios campos. Escondemos/mostramos com JS. -->

    <form id="form-estudante" class="form-cadastro">
      <label for="est-nome">Nome</label>
      <input type="text" id="est-nome" required />

      <label for="est-cpf">CPF</label>
      <input type="text" id="est-cpf" maxlength="11" required />

      <label for="est-data-nascimento">Data de nascimento</label>
      <input type="date" id="est-data-nascimento" required />

      <label for="est-numero-contato">Telefone</label>
      <input type="tel" id="est-numero-contato" required />

      <label for="est-email">E-mail</label>
      <input type="email" id="est-email" required />

      <label for="est-senha">Senha</label>
      <input type="password" id="est-senha" required minlength="6" />

      <label for="est-endereco">Endereço</label>
      <input type="text" id="est-endereco" required />

      <label for="est-bairro">Bairro</label>
      <input type="text" id="est-bairro" required />

      <label for="est-cidade">Cidade</label>
      <input type="text" id="est-cidade" required />

      <label for="est-instituicao-id">ID da instituição de ensino (opcional)</label>
      <input type="number" id="est-instituicao-id" />

      <label for="est-cursando">Curso</label>
      <input type="text" id="est-cursando" required />

      <label for="est-periodo-ensino">Período/semestre</label>
      <input type="text" id="est-periodo-ensino" required />

      <label for="est-turno-estudo">Turno</label>
      <select id="est-turno-estudo" required>
        <option value="Matutino">Matutino</option>
        <option value="Vespertino">Vespertino</option>
        <option value="Noturno">Noturno</option>
      </select>

      <label for="est-pcd">
        <input type="checkbox" id="est-pcd" style="width:auto;display:inline-block;" />
        Pessoa com deficiência (PCD)
      </label>

      <label for="est-tipo-deficiencia">Tipo de deficiência (se PCD)</label>
      <input type="text" id="est-tipo-deficiencia" />

      <label for="est-nome-responsavel">Nome do responsável (se menor de idade)</label>
      <input type="text" id="est-nome-responsavel" />

      <label for="est-numero-responsavel">Telefone do responsável</label>
      <input type="tel" id="est-numero-responsavel" />

      <button type="submit">Cadastrar</button>
    </form>

    <form id="form-empresa" class="form-cadastro" hidden>
      <label for="emp-cnpj">CNPJ</label>
      <input type="text" id="emp-cnpj" maxlength="14" required />

      <label for="emp-nome">Nome</label>
      <input type="text" id="emp-nome" required />

      <label for="emp-email">E-mail</label>
      <input type="email" id="emp-email" required />

      <label for="emp-senha">Senha</label>
      <input type="password" id="emp-senha" required minlength="6" />

      <label for="emp-endereco">Endereço</label>
      <input type="text" id="emp-endereco" required />

      <label for="emp-nome-responsavel">Nome do responsável</label>
      <input type="text" id="emp-nome-responsavel" />

      <label for="emp-numero-contato">Telefone</label>
      <input type="tel" id="emp-numero-contato" />

      <button type="submit">Cadastrar</button>
    </form>

    <form id="form-instituicao" class="form-cadastro" hidden>
      <label for="inst-cnpj">CNPJ</label>
      <input type="text" id="inst-cnpj" maxlength="14" required />

      <label for="inst-nome">Nome</label>
      <input type="text" id="inst-nome" required />

      <label for="inst-nome-fantasia">Nome fantasia</label>
      <input type="text" id="inst-nome-fantasia" />

      <label for="inst-email">E-mail</label>
      <input type="email" id="inst-email" required />

      <label for="inst-senha">Senha</label>
      <input type="password" id="inst-senha" required minlength="6" />

      <label for="inst-endereco">Endereço</label>
      <input type="text" id="inst-endereco" required />

      <label for="inst-cidade-estado">Cidade/Estado</label>
      <input type="text" id="inst-cidade-estado" required />

      <label for="inst-site">Site institucional</label>
      <input type="url" id="inst-site" />

      <label for="inst-nome-responsavel">Nome do responsável</label>
      <input type="text" id="inst-nome-responsavel" required />

      <label for="inst-numero-responsavel">Telefone do responsável</label>
      <input type="tel" id="inst-numero-responsavel" required />

      <label for="inst-cargo">Cargo/função do responsável</label>
      <input type="text" id="inst-cargo" required />

      <label for="inst-departamento">Departamento/setor</label>
      <input type="text" id="inst-departamento" required />

      <label for="inst-modelo-atuacao">Modelo de atuação</label>
      <select id="inst-modelo-atuacao" required>
        <option value="presencial">Presencial</option>
        <option value="hibrido">Híbrido</option>
        <option value="remoto">Remoto</option>
      </select>

      <label for="inst-numero-contato">Telefone institucional</label>
      <input type="tel" id="inst-numero-contato" required />

      <button type="submit">Cadastrar</button>
    </form>

    <p id="mensagem-cadastro" class="mensagem"></p>

    <p>Já tem conta? <a href="login.html">Entrar</a></p>
  </main>

  <script src="JS/script.js"></script>
</body>
</html>
